name: Firebase Dev Deploy

on:
  push:
    branches:
      - dev

permissions:
  contents: read

concurrency:
  group: firebase-dev
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: |
          test -n "$VITE_SUPABASE_URL"
          test -n "$VITE_SUPABASE_PUBLISHABLE_KEY"
          test -n "$VITE_MAPBOX_ACCESS_TOKEN"
          npx vite build --mode development
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_DEV_URL || secrets.VITE_SUPABASE_DEV_URL || vars.VITE_SUPABASE_URL || secrets.VITE_SUPABASE_URL || vars.NEXT_PUBLIC_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_DEV_PUBLISHABLE_KEY || vars.VITE_SUPABASE_DEV_PUBLISHABLE_KEY || secrets.VITE_SUPABASE_DEV_ANON_KEY || vars.VITE_SUPABASE_DEV_ANON_KEY || secrets.VITE_SUPABASE_PUBLISHABLE_KEY || vars.VITE_SUPABASE_PUBLISHABLE_KEY || secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY }}
          VITE_MAPBOX_ACCESS_TOKEN: ${{ vars.VITE_MAPBOX_DEV_ACCESS_TOKEN || secrets.VITE_MAPBOX_DEV_ACCESS_TOKEN || vars.VITE_MAPBOX_ACCESS_TOKEN || secrets.VITE_MAPBOX_ACCESS_TOKEN || vars.NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN || secrets.NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN }}

      - name: Deploy dev channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ vars.FIREBASE_PROJECT_ID }}
          target: dev
          channelId: live
